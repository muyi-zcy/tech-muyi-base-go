# consumer 示例：通过 Nacos 发现并调用 producer

app_name = "example-consumer"
version = "1.0.0"

[server]
port = 8082
mode = "dev"

[log]
level = "debug"
filename = "logs/example-consumer-dev.log"
maxsize = 100
maxage = 30
maxbackups = 3
compress = true
stdout = true
log_sql = false

[database]
driver = "mysql"
host = "192.168.0.181"
port = 3306
username = "root"
password = "devMysqlpasswd"
database = "tech_muyi_example"
max_open_conns = 5
max_idle_conns = 2

[redis]
host = "192.168.0.181"
port = 6379
password = "devRedisPasswd"
db = 0

[plugins.nacos]
enabled = true
serverAddr = "192.168.0.181:8848"
namespace = "dev"
group = "XI_PLATFORM"
serviceName = "example.consumer"
configEnabled = false

[plugins.rpc]
enabled = true
protocol = "grpc"
registry = "nacos"

[plugins.rpc.server]
port = 9082
enableReflection = true

[plugins.rpc.client]
defaultTimeoutMs = 5000

[plugins.rpc.client.services]
example_producer = "example.producer"
