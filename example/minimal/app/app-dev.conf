# minimal 示例：测试 base 包（HTTP + MySQL + Redis，无 Nacos/RPC）

app_name = "example-minimal"
version = "1.0.0"

[server]
port = 8080
mode = "dev"

[log]
level = "debug"
filename = "logs/example-minimal-dev.log"
maxsize = 100
maxage = 30
maxbackups = 3
compress = true
stdout = true
log_sql = true

[database]
driver = "mysql"
host = "192.168.0.181"
port = 3306
username = "root"
password = "devMysqlpasswd"
database = "tech_muyi_example"
max_open_conns = 10
max_idle_conns = 5
conn_max_lifetime = 0
conn_timeout_sec = 10
read_timeout_sec = 3
write_timeout_sec = 3
skip_default_transaction = true
prepare_stmt = false
slow_threshold_ms = 200
timezone = "Local"

[redis]
host = "192.168.0.181"
port = 6379
password = "devRedisPasswd"
db = 0
pool_size = 10
min_idle_conns = 2
dial_timeout_sec = 5
read_timeout_sec = 3
write_timeout_sec = 3
pool_timeout_sec = 4
idle_timeout_sec = 300
max_retries = 2

[plugins.nacos]
enabled = false

[plugins.rpc]
enabled = false
