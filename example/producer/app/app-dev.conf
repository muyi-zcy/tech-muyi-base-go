# producer 示例：gRPC 服务 + static 直连（同时注册 Nacos 供 consumer 发现）

app_name = "example-producer"
version = "1.0.0"

[server]
port = 8081
mode = "dev"

[log]
level = "debug"
filename = "logs/example-producer-dev.log"
maxsize = 100
maxage = 30
maxbackups = 3
compress = true
stdout = true
log_sql = false

[database]
driver = "mysql"
host = "192.168.0.181"
port = 3306
username = "root"
password = "devMysqlpasswd"
database = "tech_muyi_example"
max_open_conns = 5
max_idle_conns = 2

[redis]
host = "192.168.0.181"
port = 6379
password = "devRedisPasswd"
db = 0

[plugins.nacos]
enabled = true
serverAddr = "192.168.0.181:8848"
namespace = "dev"
group = "XI_PLATFORM"
serviceName = "example.producer"
configEnabled = false

[plugins.rpc]
enabled = true
protocol = "grpc"
registry = "static"

[plugins.rpc.server]
port = 9081
maxRecvMsgSize = 4194304
enableReflection = true

[plugins.rpc.client]
defaultTimeoutMs = 3000

[plugins.rpc.client.services]
example_producer = "example.producer"
example_consumer = "example.consumer"

[plugins.rpc.static]
example_producer = "127.0.0.1:9081"
example_consumer = "127.0.0.1:9082"
