appCode: platform
codes:
  - code: platform.validation.required
    httpHint: 400
    args: [field]
  - code: platform.resource.not_found
    httpHint: 404
    args: [resource, id]
  - code: platform.route.not_found
    httpHint: 404
  - code: platform.method.not_allowed
    httpHint: 405
  - code: platform.auth.token_missing
    httpHint: 401
  - code: platform.auth.token_invalid
    httpHint: 401
  - code: platform.auth.permission_denied
    httpHint: 403
  - code: platform.unauthorized
    httpHint: 401
  - code: platform.forbidden
    httpHint: 403
  - code: platform.conflict
    httpHint: 409
  - code: platform.rate_limited
    httpHint: 429
  - code: platform.internal_error
    httpHint: 500
