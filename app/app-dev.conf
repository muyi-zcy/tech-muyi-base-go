# 开发环境配置文件

app_name = "NewService"
version = "1.0.0"

[server]
port = 8080
mode = "dev"

[log]
level = "debug"
filename = "logs/new-service-dev.log"
maxsize = 100
maxage = 30
maxbackups = 3
compress = true
stdout = true
log_sql = true

[database]
driver = "mysql"
host = "192.168.0.102"
port = 3306
username = "root"
password = "ca"
database = "my-ideaistudio-bahang"
max_open_conns = 25
max_idle_conns = 25
conn_max_lifetime = 0

[redis]
host = "192.168.0.102"
port = 6379
password = "devRedisPasswd"
db = 0

# 可插拔基础设施（默认关闭，minimal 场景无需 Nacos/RPC）
[plugins.nacos]
enabled = false
serverAddr = "127.0.0.1:8848"
namespace = "dev"
group = "XI_PLATFORM"
serviceName = "demo.service"
configEnabled = false

[plugins.rpc]
enabled = false
protocol = "grpc"
registry = "nacos"

[plugins.rpc.server]
port = 9080
maxRecvMsgSize = 4194304
enableReflection = true

[plugins.rpc.client]
defaultTimeoutMs = 3000

[plugins.rpc.client.services]
# xi.user = "xi.user"

[plugins.rpc.static]
# xi.user = "127.0.0.1:9081"